services:
  db:
    image: postgres:16-alpine
    container_name: grocery_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-grocery_booking}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - grocery_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-grocery_booking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grocery_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-grocery_booking}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DIALECT: postgres
      DB_LOGGING: "false"
      JWT_SECRET: ${JWT_SECRET:-please_change_me_in_production_to_a_long_random_value}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@grocery.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
      ADMIN_NAME: ${ADMIN_NAME:-Default Admin}
    ports:
      - "${PORT:-3000}:3000"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grocery_seed
    profiles: ["seed"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-grocery_booking}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DIALECT: postgres
      JWT_SECRET: ${JWT_SECRET:-please_change_me_in_production_to_a_long_random_value}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@grocery.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
      ADMIN_NAME: ${ADMIN_NAME:-Default Admin}
    command: ["node", "src/scripts/seed.js"]

volumes:
  grocery_pgdata:
